<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Fibox Product Assistant — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #EEF3F9;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border: 1px solid #D9E4EF;
      border-radius: 16px;
      overflow: hidden;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
    }
    .card-header {
      background: #1F5C99;
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo-wrap {
      background: #fff;
      border-radius: 8px;
      padding: 5px 10px;
      display: flex;
      align-items: center;
    }
    .logo-wrap img { height: 34px; width: auto; display: block; }
    .card-header-text h1 {
      font-size: 17px; font-weight: 700; color: #fff;
    }
    .card-header-text p {
      font-size: 12px; color: #B8D4F0; margin-top: 2px;
    }
    .card-body { padding: 28px 24px 24px; }
    .card-body p {
      font-size: 14px; color: #5A7490; margin-bottom: 20px; line-height: 1.5;
    }
    label {
      display: block;
      font-size: 13px; font-weight: 600; color: #1F5C99;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      border: 1.5px solid #C5D9EE;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 16px;
      outline: none;
      font-family: inherit;
      transition: border-color .2s;
    }
    input[type="password"]:focus { border-color: #1F5C99; }
    .error {
      font-size: 13px; color: #c0392b;
      margin-top: 8px; min-height: 18px;
    }
    button[type="submit"] {
      margin-top: 20px;
      width: 100%;
      background: #1F5C99;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    button[type="submit"]:hover { background: #174d84; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="logo-wrap">
        <img src="/static/fibox-logo.png" alt="Fibox" />
      </div>
      <div class="card-header-text">
        <h1>Product Assistant</h1>
        <p>Fibox Enclosure Finder</p>
      </div>
    </div>
    <div class="card-body">
      <p>Enter the password to access the Fibox Product Assistant.</p>
      <form method="POST">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="Enter password" autofocus autocomplete="current-password" />
        <div class="error">{{ error }}</div>
        <button type="submit">Sign In</button>
      </form>
    </div>
  </div>
</body>
</html>
