<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fibox Product Assistant</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    /* ── reset & base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #EEF3F9;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── header ───────────────────────────────────────────────────────────── */
    header {
      background: #1F5C99;
      color: #fff;
      padding: 0 24px;
      height: 62px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      flex-shrink: 0;
      z-index: 10;
    }
    .logo-mark {
      width: 38px; height: 38px;
      background: #fff;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-mark span {
      font-size: 18px; font-weight: 800;
      color: #1F5C99; letter-spacing: -1px;
    }
    .header-text h1 {
      font-size: 17px; font-weight: 700; letter-spacing: .3px;
    }
    .header-text p {
      font-size: 12px; color: #B8D4F0; margin-top: 1px;
    }
    .header-badge {
      margin-left: auto;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      color: #D9E8F5;
    }

    /* ── chat area ────────────────────────────────────────────────────────── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    /* ── message bubbles ──────────────────────────────────────────────────── */
    .msg {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      max-width: 960px;
      width: 100%;
    }
    .msg.user  { margin-left: auto; flex-direction: row-reverse; }
    .msg.agent { margin-right: auto; }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
    }
    .msg.agent .avatar { background: #1F5C99; color: #fff; }
    .msg.user  .avatar { background: #D9E8F5; color: #1F5C99; }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      max-width: calc(100% - 48px);
      word-break: break-word;
      overflow-x: auto;
    }
    .msg.user  .bubble {
      background: #1F5C99;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.agent .bubble {
      background: #fff;
      color: #1A1A2E;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    /* markdown inside agent bubble */
    .bubble p  { margin-bottom: 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul, .bubble ol { margin: 6px 0 8px 20px; }
    .bubble li { margin-bottom: 3px; }
    .bubble strong { color: #1F5C99; }
    .bubble a  { color: #1F5C99; text-decoration: underline; }
    .bubble table {
      border-collapse: collapse;
      font-size: 13px; margin: 10px 0;
      width: auto; min-width: 100%;
    }
    .bubble th {
      background: #1F5C99; color: #fff;
      padding: 8px 14px; text-align: left; font-weight: 600;
      white-space: nowrap;
    }
    .bubble td {
      padding: 7px 14px;
      border-bottom: 1px solid #E8EEF5;
      white-space: nowrap;
    }
    /* Allow long descriptions to wrap, but keep other columns on one line */
    .bubble td:nth-child(4) { white-space: normal; min-width: 180px; }
    .bubble td:nth-child(7) { white-space: normal; min-width: 160px; }
    .bubble tr:nth-child(even) td { background: #F5F9FF; }
    .bubble code {
      background: #F0F4FA; padding: 2px 6px;
      border-radius: 4px; font-size: 12px;
    }
    .bubble pre {
      background: #F0F4FA; padding: 10px 12px;
      border-radius: 8px; overflow-x: auto;
      font-size: 12px; margin: 8px 0;
    }

    /* ── typing indicator ─────────────────────────────────────────────────── */
    .typing-indicator {
      display: flex; align-items: center; gap: 5px;
      padding: 12px 16px;
    }
    .typing-indicator span {
      width: 8px; height: 8px; border-radius: 50%;
      background: #9DB8D9;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: .2s; }
    .typing-indicator span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-6px); }
    }

    /* ── suggested prompts ────────────────────────────────────────────────── */
    .suggestions {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 0 16px 8px;
      max-width: 780px;
    }
    .suggestion-btn {
      background: #fff;
      border: 1px solid #C5D9EE;
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 13px; color: #1F5C99;
      cursor: pointer;
      transition: all .15s;
    }
    .suggestion-btn:hover {
      background: #1F5C99; color: #fff; border-color: #1F5C99;
    }

    /* ── input bar ────────────────────────────────────────────────────────── */
    .input-bar {
      background: #fff;
      border-top: 1px solid #D9E4EF;
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #user-input {
      flex: 1;
      border: 1.5px solid #C5D9EE;
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 14px;
      resize: none;
      max-height: 120px;
      outline: none;
      font-family: inherit;
      line-height: 1.45;
      transition: border-color .2s;
    }
    #user-input:focus { border-color: #1F5C99; }
    #user-input::placeholder { color: #9DAFC2; }

    #send-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: #1F5C99; border: none;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .1s;
    }
    #send-btn:hover   { background: #174d84; }
    #send-btn:active  { transform: scale(.93); }
    #send-btn:disabled { background: #9DB8D9; cursor: not-allowed; }
    #send-btn svg { width: 18px; height: 18px; fill: #fff; }

    /* ── welcome card ─────────────────────────────────────────────────────── */
    .welcome {
      background: #fff;
      border: 1px solid #D9E4EF;
      border-radius: 16px;
      padding: 24px;
      max-width: 520px;
      margin: auto;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .welcome .icon {
      font-size: 36px; margin-bottom: 12px;
    }
    .welcome h2 {
      font-size: 18px; color: #1F5C99; margin-bottom: 8px;
    }
    .welcome p {
      font-size: 14px; color: #5A7490; line-height: 1.6;
    }

    /* ── responsive ───────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      #chat { padding: 16px 10px; }
      .input-bar { padding: 10px 10px; }
      .bubble { font-size: 13.5px; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header>
  <div class="logo-mark"><span>Fb</span></div>
  <div class="header-text">
    <h1>Fibox</h1>
    <p>Product Assistant</p>
  </div>
  <div class="header-badge">🟢 Online</div>
</header>

<!-- ── Chat area ───────────────────────────────────────────────────────────── -->
<div id="chat">
  <div class="welcome" id="welcome-card">
    <div class="icon">📦</div>
    <h2>Welcome to the Fibox Product Assistant</h2>
    <p>I can help you find the right enclosure by size, provide product links,
       packaging details, and tell you where to buy Fibox products in your country.</p>
  </div>
</div>

<!-- ── Suggested prompts ───────────────────────────────────────────────────── -->
<div class="suggestions" id="suggestions">
  <button class="suggestion-btn" onclick="sendSuggestion(this)">Find enclosure ~300×250×150 mm</button>
  <button class="suggestion-btn" onclick="sendSuggestion(this)">Show NEO polycarbonate range</button>
  <button class="suggestion-btn" onclick="sendSuggestion(this)">Where to buy in Germany?</button>
  <button class="suggestion-btn" onclick="sendSuggestion(this)">What is the IP rating of NEO enclosures?</button>
</div>

<!-- ── Input bar ───────────────────────────────────────────────────────────── -->
<div class="input-bar">
  <textarea id="user-input" rows="1"
    placeholder="Ask about enclosure sizes, products, or where to buy…"></textarea>
  <button id="send-btn" onclick="sendMessage()" title="Send">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
  const chatEl   = document.getElementById('chat');
  const inputEl  = document.getElementById('user-input');
  const sendBtn  = document.getElementById('send-btn');
  const suggsEl  = document.getElementById('suggestions');

  // Conversation history sent to the backend
  let history = [];

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // Send on Enter (Shift+Enter = new line)
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function sendSuggestion(btn) {
    inputEl.value = btn.textContent;
    sendMessage();
  }

  function appendMsg(role, html) {
    const isUser  = role === 'user';
    const wrapper = document.createElement('div');
    wrapper.className = `msg ${role}`;

    const avatar  = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = isUser ? 'You' : 'Fb';

    const bubble  = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = html;

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    chatEl.appendChild(wrapper);
    chatEl.scrollTop = chatEl.scrollHeight;
    return bubble;
  }

  function showTyping() {
    const wrapper = document.createElement('div');
    wrapper.className = 'msg agent';
    wrapper.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'Fb';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = `<div class="typing-indicator">
      <span></span><span></span><span></span>
    </div>`;

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    chatEl.appendChild(wrapper);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    // Hide welcome card and suggestions after first message
    const welcome = document.getElementById('welcome-card');
    if (welcome) welcome.remove();
    suggsEl.style.display = 'none';

    // Show user message
    appendMsg('user', escapeHtml(text));
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    // Show typing indicator
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history }),
      });

      const data = await res.json();
      removeTyping();

      if (data.error) {
        appendMsg('agent', `<em style="color:#c0392b">Error: ${escapeHtml(data.error)}</em>`);
      } else {
        // Update history
        history.push({ role: 'user',      content: text });
        history.push({ role: 'assistant', content: data.response });

        // Render markdown
        appendMsg('agent', marked.parse(data.response));
      }
    } catch (err) {
      removeTyping();
      appendMsg('agent', '<em style="color:#c0392b">Connection error — please try again.</em>');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;')
              .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Configure marked for safe rendering
  marked.setOptions({ breaks: true, gfm: true });
</script>
</body>
</html>
