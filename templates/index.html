<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Fibox Product Assistant</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    /* ── reset & base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #EEF3F9;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── header ───────────────────────────────────────────────────────────── */
    header {
      background: #1F5C99;
      color: #fff;
      padding: 0 24px;
      height: 68px;
      display: flex;
      align-items: center;
      gap: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      flex-shrink: 0;
      z-index: 10;
      position: relative;
    }
    .logo-wrap {
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }
    .logo-wrap img {
      height: 44px;
      width: auto;
      display: block;
    }
    .header-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: .5px;
      color: #fff;
      white-space: nowrap;
    }
    .header-badge {
      margin-left: auto;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      color: #D9E8F5;
    }

    /* ── chat area ────────────────────────────────────────────────────────── */
    #chat {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    /* ── message bubbles ──────────────────────────────────────────────────── */
    .msg {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      max-width: 960px;
      width: 100%;
    }
    .msg.user  { margin-left: auto; flex-direction: row-reverse; }
    .msg.agent { margin-right: auto; }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
    }
    .msg.agent .avatar { background: #1F5C99; color: #fff; }
    .msg.user  .avatar { background: #D9E8F5; color: #1F5C99; }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      max-width: calc(100% - 48px);
      word-break: break-word;
      overflow-x: auto;
    }
    .msg.user  .bubble {
      background: #1F5C99;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.agent .bubble {
      background: #fff;
      color: #1A1A2E;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    /* markdown inside agent bubble */
    .bubble p  { margin-bottom: 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul, .bubble ol { margin: 6px 0 8px 20px; }
    .bubble li { margin-bottom: 3px; }
    .bubble strong { color: #1F5C99; }
    .bubble a  { color: #1F5C99; text-decoration: underline; }
    .bubble table {
      border-collapse: collapse;
      font-size: 13px; margin: 10px 0;
      width: auto; min-width: 100%;
    }
    .bubble th {
      background: #1F5C99; color: #fff;
      padding: 8px 14px; text-align: left; font-weight: 600;
      white-space: nowrap;
    }
    .bubble td {
      padding: 7px 14px;
      border-bottom: 1px solid #E8EEF5;
      white-space: nowrap;
    }
    /* Allow long descriptions and links to wrap */
    .bubble td:nth-child(4) { white-space: normal; min-width: 180px; }
    .bubble td:nth-child(7) { white-space: normal; min-width: 160px; }
    .bubble tr:nth-child(even) td { background: #F5F9FF; }
    .bubble code {
      background: #F0F4FA; padding: 2px 6px;
      border-radius: 4px; font-size: 12px;
    }
    .bubble pre {
      background: #F0F4FA; padding: 10px 12px;
      border-radius: 8px; overflow-x: auto;
      font-size: 12px; margin: 8px 0;
    }

    /* ── typing indicator ─────────────────────────────────────────────────── */
    .typing-indicator {
      display: flex; align-items: center; gap: 5px;
      padding: 12px 16px;
    }
    .typing-indicator span {
      width: 8px; height: 8px; border-radius: 50%;
      background: #9DB8D9;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: .2s; }
    .typing-indicator span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-6px); }
    }

    /* ── suggested prompts ────────────────────────────────────────────────── */
    .suggestions {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 0 16px 12px;
      max-width: 960px;
    }
    .suggestion-btn {
      background: #fff;
      border: 1px solid #C5D9EE;
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 13px; color: #1F5C99;
      cursor: pointer;
      transition: all .15s;
    }
    .suggestion-btn:hover {
      background: #1F5C99; color: #fff; border-color: #1F5C99;
    }

    /* ── attachment preview ──────────────────────────────────────────────── */
    #attach-preview {
      background: #F0F6FF;
      border-top: 1px solid #D9E4EF;
      padding: 8px 16px;
      display: none;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #1F5C99;
      flex-shrink: 0;
    }
    #attach-preview img {
      height: 48px; width: 48px; object-fit: cover;
      border-radius: 6px; border: 1px solid #C5D9EE;
    }
    #attach-preview .attach-name { flex: 1; font-weight: 500; }
    #attach-preview .attach-remove {
      cursor: pointer; color: #9DAFC2; font-size: 18px; line-height: 1;
    }
    #attach-preview .attach-remove:hover { color: #c0392b; }

    /* ── download bar ─────────────────────────────────────────────────────── */
    #download-bar {
      background: #fff;
      border-top: 1px solid #D9E4EF;
      padding: 8px 16px;
      display: none;
      align-items: center;
      justify-content: flex-end;
      flex-shrink: 0;
    }
    #download-btn {
      background: #1a7a3c;
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background .15s;
    }
    #download-btn:hover { background: #155f30; }

    /* ── input bar ────────────────────────────────────────────────────────── */
    .input-bar {
      background: #fff;
      border-top: 1px solid #D9E4EF;
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #attach-btn, #mic-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: #F0F6FF; border: 1.5px solid #C5D9EE;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
      color: #1F5C99; font-size: 18px;
    }
    #attach-btn:hover { background: #D9EEFF; }
    #mic-btn:hover { background: #D9EEFF; }
    #mic-btn.listening {
      background: #FDE8E8; border-color: #e74c3c; color: #e74c3c;
      animation: mic-pulse 1s infinite;
    }
    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(231,76,60,.4); }
      50%       { box-shadow: 0 0 0 7px rgba(231,76,60,0); }
    }
    #user-input {
      flex: 1;
      border: 1.5px solid #C5D9EE;
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 14px;
      resize: none;
      max-height: 120px;
      outline: none;
      font-family: inherit;
      line-height: 1.45;
      transition: border-color .2s;
    }
    #user-input:focus { border-color: #1F5C99; }
    #user-input::placeholder { color: #9DAFC2; }

    #send-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: #1F5C99; border: none;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .1s;
    }
    #send-btn:hover   { background: #174d84; }
    #send-btn:active  { transform: scale(.93); }
    #send-btn:disabled { background: #9DB8D9; cursor: not-allowed; }
    #send-btn svg { width: 18px; height: 18px; fill: #fff; }

    /* ── welcome card ─────────────────────────────────────────────────────── */
    .welcome {
      background: #fff;
      border: 1px solid #D9E4EF;
      border-radius: 16px;
      overflow: hidden;
      max-width: 520px;
      margin: auto;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .welcome-img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }
    .welcome-body {
      padding: 24px;
    }
    .welcome h2 {
      font-size: 18px; color: #1F5C99; margin-bottom: 8px;
    }
    .welcome p {
      font-size: 14px; color: #5A7490; line-height: 1.6;
    }

    /* ── responsive ───────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      /* Header */
      header { height: 56px; padding: 0 12px; }
      .logo-wrap img { height: 34px; }
      .header-title { font-size: 16px; }
      .header-badge { display: none; }          /* hide badge to avoid overlap */

      /* Chat */
      #chat { padding: 12px 8px; gap: 12px; }

      /* Bubbles — hide avatars to give full width to content */
      .avatar { display: none; }
      .bubble {
        font-size: 14px;
        max-width: 100%;
        padding: 10px 13px;
      }

      /* Tables — horizontal scroll with compact sizing */
      .bubble table { font-size: 11px; }
      .bubble th, .bubble td { padding: 6px 8px; }
      .bubble td:nth-child(4) { min-width: 130px; }
      .bubble td:nth-child(7) { min-width: 110px; }

      /* Welcome card */
      .welcome { max-width: 100%; margin: 8px 0; }
      .welcome-img { height: 160px; }
      .welcome-body { padding: 16px; }
      .welcome h2 { font-size: 16px; }

      /* Suggestions */
      .suggestions { padding: 0 8px 10px; gap: 6px; }
      .suggestion-btn { font-size: 12px; padding: 6px 12px; }

      /* Input bar — prevent iOS auto-zoom (needs font-size ≥ 16px) */
      .input-bar { padding: 10px 8px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
      #user-input { font-size: 16px; padding: 9px 14px; }
      #send-btn { width: 40px; height: 40px; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header>
  <div class="logo-wrap" onclick="resetChat()" title="Back to start" style="cursor:pointer;">
    <img src="/static/fibox-logo.png" alt="Fibox" />
  </div>
  <span class="header-title">Product Assistant</span>
  <div class="header-badge">🟢 Online</div>
</header>

<!-- ── Chat area ───────────────────────────────────────────────────────────── -->
<div id="chat">
  <div class="welcome" id="welcome-card">
    <img class="welcome-img" src="/static/fibox-products.jpg" alt="Fibox enclosures" />
    <div class="welcome-body">
      <h2>Welcome to the Fibox Product Assistant</h2>
      <p>I can help you find the right enclosure by size, provide product links,
         packaging details, and tell you where to buy Fibox products in your country.</p>
    </div>
  </div>
</div>

<!-- ── Suggested prompts ───────────────────────────────────────────────────── -->
<div class="suggestions" id="suggestions"></div>

<!-- ── Attachment preview ──────────────────────────────────────────────────── -->
<div id="attach-preview">
  <img id="attach-thumb" src="" alt="" style="display:none" />
  <span id="attach-icon" style="font-size:28px;display:none">📄</span>
  <span class="attach-name" id="attach-name"></span>
  <span class="attach-remove" onclick="clearAttachment()" title="Remove">×</span>
</div>

<!-- ── Download bar ────────────────────────────────────────────────────────── -->
<div id="download-bar">
  <button id="download-btn" onclick="downloadToExcel()">📥 Download to Excel</button>
</div>

<!-- ── Input bar ───────────────────────────────────────────────────────────── -->
<input type="file" id="file-input" accept="image/*,application/pdf" style="display:none" />
<div class="input-bar">
  <button id="attach-btn" onclick="document.getElementById('file-input').click()" title="Attach image or PDF">📎</button>
  <button id="mic-btn" onclick="toggleMic()" title="Speak your question">🎤</button>
  <textarea id="user-input" rows="1"
    placeholder="Ask about enclosure sizes, products, or where to buy..."></textarea>
  <button id="send-btn" onclick="sendMessage()" title="Send">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
  const chatEl      = document.getElementById('chat');
  const inputEl     = document.getElementById('user-input');
  const sendBtn     = document.getElementById('send-btn');
  const suggsEl     = document.getElementById('suggestions');
  const fileInput   = document.getElementById('file-input');
  const previewEl   = document.getElementById('attach-preview');
  const downloadBar = document.getElementById('download-bar');
  let attachment    = null;   // {type, data (base64), media_type, name}
  let lastAgentBubble = null; // tracks the most recent assistant bubble

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const b64 = e.target.result.split(',')[1];
      const isImg = file.type.startsWith('image/');
      attachment = {
        type      : isImg ? 'image' : 'pdf',
        data      : b64,
        media_type: file.type,
        name      : file.name,
      };
      document.getElementById('attach-name').textContent = file.name;
      if (isImg) {
        const thumb = document.getElementById('attach-thumb');
        thumb.src = e.target.result; thumb.style.display = '';
        document.getElementById('attach-icon').style.display = 'none';
      } else {
        document.getElementById('attach-thumb').style.display = 'none';
        document.getElementById('attach-icon').style.display = '';
      }
      previewEl.style.display = 'flex';
    };
    reader.readAsDataURL(file);
    fileInput.value = '';
  });

  function clearAttachment() {
    attachment = null;
    previewEl.style.display = 'none';
    document.getElementById('attach-thumb').src = '';
  }

  // Conversation history sent to the backend
  let history = [];

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // Send on Enter (Shift+Enter = new line)
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function sendSuggestion(btn) {
    inputEl.value = btn.textContent;
    sendMessage();
  }

  function appendMsg(role, html) {
    const isUser  = role === 'user';
    const wrapper = document.createElement('div');
    wrapper.className = `msg ${role}`;

    const avatar  = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = isUser ? 'You' : 'Fb';

    const bubble  = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = html;

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    chatEl.appendChild(wrapper);
    chatEl.scrollTop = chatEl.scrollHeight;

    if (!isUser) {
      lastAgentBubble = bubble;
      downloadBar.style.display = 'flex';
    }
    return bubble;
  }

  function showTyping() {
    const wrapper = document.createElement('div');
    wrapper.className = 'msg agent';
    wrapper.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'Fb';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = `<div class="typing-indicator">
      <span></span><span></span><span></span>
    </div>`;

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    chatEl.appendChild(wrapper);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if ((!text && !attachment) || sendBtn.disabled) return;

    // Hide welcome card and suggestions after first message
    const welcome = document.getElementById('welcome-card');
    if (welcome) welcome.remove();
    suggsEl.style.display = 'none';

    // Show user message (with attachment indicator if present)
    let displayHtml = escapeHtml(text || '');
    if (attachment) {
      const icon = attachment.type === 'image' ? '🖼️' : '📄';
      displayHtml += `<div style="margin-top:6px;font-size:12px;opacity:.8">${icon} ${escapeHtml(attachment.name)}</div>`;
    }
    appendMsg('user', displayHtml);

    const sentAttachment = attachment;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    clearAttachment();
    sendBtn.disabled = true;

    // Show typing indicator
    showTyping();

    try {
      const body = { message: text, history };
      if (sentAttachment) body.attachment = sentAttachment;
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      const data = await res.json();
      removeTyping();

      if (data.error) {
        appendMsg('agent', `<em style="color:#c0392b">Error: ${escapeHtml(data.error)}</em>`);
      } else {
        // Update history
        history.push({ role: 'user',      content: text });
        history.push({ role: 'assistant', content: data.response });

        // Render markdown
        appendMsg('agent', marked.parse(data.response));
      }
    } catch (err) {
      removeTyping();
      appendMsg('agent', '<em style="color:#c0392b">Connection error -- please try again.</em>');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;')
              .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Open all links in a new tab
  const renderer = new marked.Renderer();
  renderer.link = (href, title, text) =>
    `<a href="${href}" target="_blank" rel="noopener"${title ? ` title="${title}"` : ''}>${text}</a>`;
  marked.setOptions({ breaks: true, gfm: true, renderer });

  // ── Sample prompts ──────────────────────────────────────────────────────────
  // First item always shown as prompt #1; remaining 3 picked randomly from the rest
  const FIRST_PROMPTS = [
    'I need enclosure 400×300×150',
    'Find enclosure 300×250×100',
    'Looking for something around 200×200×100',
    'Find enclosure 500×400×210',
    'I need a shallow box, about 300×200×80',
    'Something close to 150×150×100',
    'Find enclosure around 600×400×210',
    'I need a large enclosure 700×500×300',
  ];

  const OTHER_PROMPTS = [
    'Show ARCA IEC range',
    'Show NEO polycarbonate range',
    'Show MNX compact range',
    'Show EURONORD range',
    'Show TEMPO lightweight range',
    'Show SOLID GRP range',
    'List CAB ABS enclosures',
    'Show PICCOLO miniature range',
    'Show ARCA cabinets with window cover',
    'Show ARCA cabinets with swinghandle',
    'List ARCA cabinets without mounting plate',
    'Compare ARCA and SOLID enclosures',
    'Compare MNX and EURONORD for DIN-rail use',
    'Compare NEO and MNX — which is better outdoors?',
    'Advantages of ARCA vs metal cabinets',
    'Polycarbonate vs ABS — what is the difference?',
    'What are the benefits of Polycarbonate vs Metal?',
    'When should I choose GRP over polycarbonate?',
    'What is better for outdoor use — NEO or SOLID?',
    'Which enclosure is best for corrosive environments?',
    'What is the most impact-resistant Fibox enclosure?',
    'What IP rating does NEO have?',
    'What does IK10 impact rating mean?',
    'Which enclosures are UV-resistant?',
    'Are Fibox enclosures halogen-free?',
    'What temperature range do Fibox enclosures support?',
    'Which enclosures have a transparent cover option?',
    'What gasket material is used in MNX enclosures?',
    'Which enclosures are UL-certified?',
    'What mounting accessories are available for NEO?',
    'Do Fibox enclosures support DIN rail mounting?',
    'Best enclosure for an outdoor electrical panel',
    'Enclosure for a Raspberry Pi project',
    'Enclosure for industrial control cabinet',
    'Suitable enclosure for food industry use',
    'What enclosure for marine / coastal environment?',
    'Where to buy Fibox in Germany?',
    'Where to buy Fibox in Poland?',
    'Where to buy Fibox in the UK?',
    'Where to buy Fibox in France?',
    'Who are the Fibox distributors in Scandinavia?',
  ];

  function renderSuggestions() {
    const first = FIRST_PROMPTS[Math.floor(Math.random() * FIRST_PROMPTS.length)];
    const rest  = [...OTHER_PROMPTS].sort(() => Math.random() - 0.5).slice(0, 3);
    suggsEl.innerHTML = [first, ...rest]
      .map(s => `<button class="suggestion-btn" onclick="sendSuggestion(this)">${s}</button>`)
      .join('');
  }

  function getCellValue(cell) {
    const link = cell.querySelector('a[href]');
    if (link) {
      const href = link.getAttribute('href');
      if (href && href.startsWith('http')) return href;
    }
    return cell.innerText.trim();
  }

  function downloadToExcel() {
    if (!lastAgentBubble) return;
    const tables = lastAgentBubble.querySelectorAll('table');
    if (!tables.length) {
      alert('No tables found in the last response.');
      return;
    }
    let allData = [];
    tables.forEach((table, idx) => {
      if (idx > 0) allData.push([]); // blank row between tables
      table.querySelectorAll('tr').forEach(row => {
        allData.push(Array.from(row.querySelectorAll('th, td')).map(getCellValue));
      });
    });
    const ws = XLSX.utils.aoa_to_sheet(allData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Results');
    XLSX.writeFile(wb, 'fibox-results.xlsx');
  }

  function resetChat() {
    history = [];
    lastAgentBubble = null;
    downloadBar.style.display = 'none';
    chatEl.innerHTML = `
      <div class="welcome" id="welcome-card">
        <img class="welcome-img" src="/static/fibox-products.jpg" alt="Fibox Enclosures" />
        <div class="welcome-body">
          <h2>Welcome to the Fibox Product Assistant</h2>
          <p>I can help you find the right enclosure by size, provide product links,
             packaging details, and tell you where to buy Fibox products in your country.</p>
        </div>
      </div>`;
    suggsEl.style.display = '';
    renderSuggestions();
  }

  renderSuggestions();

  // ── Speech input ────────────────────────────────────────────────────────────
  const micBtn = document.getElementById('mic-btn');
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;

  if (!SpeechRecognition) {
    micBtn.style.display = 'none'; // hide on unsupported browsers
  } else {
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      inputEl.value = transcript;
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
      inputEl.focus();
      micBtn.classList.remove('listening');
    };

    recognition.onerror  = () => micBtn.classList.remove('listening');
    recognition.onend    = () => micBtn.classList.remove('listening');
  }

  function toggleMic() {
    if (!recognition) return;
    if (micBtn.classList.contains('listening')) {
      recognition.stop();
      micBtn.classList.remove('listening');
    } else {
      recognition.start();
      micBtn.classList.add('listening');
    }
  }
</script>
</body>
</html>
